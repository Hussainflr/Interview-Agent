llm:
  provider: ollama
  model: qwen3:4b   # or llama3:8b

stt:
  engine: faster_whisper
  model: base
  device: cpu      # M1 uses CPU/Metal internally

tts:
  engine: pyttsx3
  voice: default  # macOS will use system default voice

app:
  temperature: 0.7
  max_tokens: 512

agents:
  verbose: true