llm:
  # provider can be "ollama" or "lmstudio"
  provider: ollama
  model: qwen3:4b
  base_url: http://localhost:11434
  lmstudio_base_url: http://localhost:1234/v1
  temperature: 0.4
  max_tokens: 900
  timeout_seconds: 60
  retries: 1
  classifier_model: qwen3:4b

stt:
  engine: faster_whisper
  model: base
  device: cpu      # M1 uses CPU/Metal internally

tts:
  engine: pyttsx3
  voice: default  # macOS will use system default voice

app:
  session_dir: outputs/sessions
  report_dir: outputs/reports
  default_role: Software Engineer
  default_difficulty: intermediate
  default_interview_type: technical
  enable_tts: false
  enable_voice: true

interview:
  max_history_items: 12
  roles:
    - Software Engineer
    - ML Engineer
    - Data Scientist
    - Project Manager
    - UN/INGO role
    - Product Manager
    - DevOps Engineer
  difficulties:
    - beginner
    - intermediate
    - advanced
  types:
    - technical
    - behavioral
    - HR
    - leadership
    - scenario-based
